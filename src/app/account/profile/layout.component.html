<div class="horizontal_box">
    <nav class="menu_box">
        <ul>
            <li class="logo"><a routerLink="**" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}"></a></li>
            <li><a routerLink="" routerLinkActive="active">FILMY</a></li>
            <li><a routerLink="" routerLinkActive="active">GRY</a></li>
            <li *ngIf="!isLoggedIn" style="float:right"><a routerLink="/account/registration" routerLinkActive="active">Dołącz do nas</a></li>
            <li *ngIf="!isLoggedIn" style="float:right"><a routerLink="/account/login" routerLinkActive="active">Zaloguj się</a></li>
            <li class="profile" *ngIf="isLoggedIn" style="float:right"><a><img *ngIf='profileImage' [src]='profileImage' width="37px" height="37px"> {{username}}</a>
                <ul>
                    <a routerLink="/account/profile" routerLinkActive="active">Profil</a>
                    <a routerLink="/library" routerLinkActive="active">Biblioteka</a>
                    <a (click)="logout()">Wyloguj się</a>
                </ul>
            </li>
        </ul>
    </nav>
    <div class="main_box">
        <div class="center_box">
            <div class="help_box"></div>
            <div class="vertical_box">
                <ul>
                    <h1>Profil Użytkownika</h1>
                    <li><a routerLink="/account/profile/info" routerLinkActive="active">- Twoje Dane</a></li>
                    <li><a routerLink="/account/profile/edit" routerLinkActive="active">- Edytuj Dane</a></li>
                    <li><a routerLink="/account/profile/photo" routerLinkActive="active">- Zdjęcie Profilowe</a></li>
                    <li><a routerLink="/account/profile/delete" routerLinkActive="active">- Usuń Konto</a></li>
                    <h1 *ngIf="adminRole">Profil Administratora</h1>
                    <li *ngIf="adminRole"><a routerLink="/account/profile/userlist" routerLinkActive="active">- Nadaj/Usuń Administratora</a></li>
                    <li *ngIf="adminRole"><a routerLink="/account/profile/addmovie">- Dodaj Film</a></li>
                    <!--<li *ngIf="adminRole"><a>- Dodaj Grę</a></li>-->
                </ul>
            </div>
            <div class="data_box">
                <router-outlet></router-outlet>
            </div>
        </div>
    </div>
</div>

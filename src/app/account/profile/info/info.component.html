<div class="info_box1">
    <h1>Nazwa Użytkownika</h1>
    <h2>{{this.username}}</h2>
    <h1>Data Założenia</h1>
    <h2>{{this.creationDate}}</h2>
</div>
<div class="info_box2">
    <h1>E-mail</h1>
    <h2>{{this.email}}</h2>
    <h1>Uprawnienia</h1>
    <p *ngFor="let role of roles">
        <td>{{role}}</td>
    </p>
</div>

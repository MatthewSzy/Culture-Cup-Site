<div class="yourgames_box">
    <div class="button_box">
        <button class="display_button" (click)="displayToPlay()">Gry do rozegrania</button>
        <button class="display_button" (click)="displayPlayed()">Gry rozegrane</button>
    </div>
    <div class="toPlay_box" *ngIf="toPlayDisplay">
        <div class="element_box" *ngFor="let gameToPlay of gamesToPlay; let i = index" routerLink="../../game/{{gameToPlay.movieId}}">
            <div class="poster_box"><img [src]="displayGamePoster(gameToPlay.posterImage)" width="240" height="350"/></div>
            <h1>{{gameToPlay.title}}</h1>
            <h2><fa-icon [icon]="faStar" style="color: rgb(255, 200, 50)"></fa-icon> {{gameToPlay.globalRating}}</h2>
        </div>
    </div>
    <div class="played_box" *ngIf="playedDisplay">
        <div class="element_box" *ngFor="let gamePlayed of gamesPlayed; let i = index" routerLink="../../movie/{{gamePlayed.movieId}}">
            <div class="poster_box"><img [src]="displayGamePoster(gamePlayed.posterImage)" width="240" height="350"/></div>
            <h1>{{gamePlayed.title}}</h1>
            <h2><fa-icon [icon]="faStar" style="color: rgb(255, 200, 50)"></fa-icon> {{gamePlayed.globalRating}}</h2>
            <h2><fa-icon [icon]="faStar" style="color: rgb(255, 200, 50)"></fa-icon> {{gamePlayed.yourRating}}</h2>
        </div>
    </div>
    <div class="footer_box">
        <div class="socialmedia_box">
            <div class="icon_box"><fa-icon [icon]="faFacebook" style="color: rgb(66, 103, 178)"></fa-icon></div>
            <div class="icon_box"><fa-icon [icon]="faSpotify" style="color: rgb(30, 215, 96)"></fa-icon></div>
            <div class="icon_box"><fa-icon [icon]="faYoutube" style="color: rgb(255, 0, 0)"></fa-icon></div>
            <div class="icon_box"><fa-icon [icon]="faTwitter" style="color: rgb(29, 161, 242)"></fa-icon></div>
        </div>
        <div class="copyright_box">
            <h1>@Copyright 2020-2021.</h1>
            <h1 style="margin-bottom: 0px;">All rights reserved. Powered by the Angular.</h1>
        </div>
    </div>
</div>
